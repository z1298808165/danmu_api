[build]
  command = "mkdir -p netlify/functions"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "danmu_api/sources/renren.js,danmu_api/sources/iqiyi.js"

[functions]
  node_bundler = "esbuild"
  external_node_modules = []

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200

[build.environment]
  # 使用逗号分隔多个需要忽略的文件路径（路径相对于项目根目录）
  SECRETS_SCAN_OMIT_PATHS = "danmu_api/sources/renren.js, danmu_api/sources/iqiyi.js"

  # 新增：告诉扫描器不要把 "TOKEN" 环境变量的值当作敏感信息去代码里匹配
  SECRETS_SCAN_OMIT_KEYS = "TOKEN"
